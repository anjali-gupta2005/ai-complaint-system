
{% extends 'base.html' %}

            <h2>ComplaintIQ</h2>
            <p>AI-Powered System</p>
        </div>

        <nav class="nav">
            <a href="{{ url_for('admin_dashboard') }}" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
