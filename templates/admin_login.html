{% extends 'base.html' %}
{% block body %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h1>Admin Login</h1>


        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="input" placeholder="admin@complaintiq.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="input" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary full-btn">Login</button>
        </form>

        <div class="demo-note">Demo credentials: admin@complaintiq.com / admin123</div>
    </div>
</div>
{% endblock %}
