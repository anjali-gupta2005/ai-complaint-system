{% extends 'base.html' %}
{% block body %}
<div class="auth-wrapper submit-screen">
    <div class="form-wrap">
        <div class="page-header">
            <h1>Submit Complaint</h1>
            <p>AI will auto-categorize & prioritize</p>
        </div>

        <div class="card form-card submit-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="input" placeholder="e.g. Priya Sharma" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="input" placeholder="priya@example.com" required>
                </div>

                <div class="form-group">
                    <label>Complaint Description</label>
                    <textarea name="complaint_text" class="textarea" placeholder="Describe your issue in detail..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Attachment (Optional)</label>
                    <input type="file" name="attachment" class="file-input">
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">Analyze & Submit →</button>
                    <a href="{{ url_for('admin_login') }}" class="btn btn-secondary">Admin Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
